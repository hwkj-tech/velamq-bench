name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  build-linux-musl:
    name: Build ${{ matrix.label }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            label: linux-x86_64-musl
          - target: aarch64-unknown-linux-musl
            label: linux-aarch64-musl

    steps:
      - name: Validate release tag
        shell: bash
        run: |
          if [[ ! "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag must use semantic versioning, for example v0.1.0" >&2
            exit 1
          fi

      - name: Check out source
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Match tag to Cargo version
        shell: bash
        run: |
          cargo_version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "velamq-bench") | .version')"
          if [[ "v${cargo_version}" != "${RELEASE_TAG}" ]]; then
            echo "Release tag ${RELEASE_TAG} does not match Cargo.toml version v${cargo_version}" >&2
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build web console
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross --locked

      - name: Build musl binaries
        run: cross build --locked --release --target "${{ matrix.target }}" --bins

      - name: Package service and agent archives
        shell: bash
        run: |
          service_package="velamq-bench-${RELEASE_TAG}-${{ matrix.label }}"
          agent_package="velamq-bench-agent-${RELEASE_TAG}-${{ matrix.label }}"

          mkdir -p "dist/${service_package}/web" "dist/${service_package}/docs/deploy" "dist/${agent_package}/docs/deploy"
          cp "target/${{ matrix.target }}/release/velamq-bench" "dist/${service_package}/"
          cp "target/${{ matrix.target }}/release/velamq-connbench" "dist/${service_package}/"
          cp -R web/dist "dist/${service_package}/web/dist"
          cp README.md CHANGELOG.md "dist/${service_package}/"
          cp docs/api.md docs/distributed-benchmark-plan.md docs/bench-agent-deployment.md "dist/${service_package}/docs/"
          cp docs/deploy/velamq-bench-agent.service "dist/${service_package}/docs/deploy/"

          cp "target/${{ matrix.target }}/release/velamq-bench-agent" "dist/${agent_package}/"
          cp README.md CHANGELOG.md "dist/${agent_package}/"
          cp docs/api.md docs/distributed-benchmark-plan.md docs/bench-agent-deployment.md "dist/${agent_package}/docs/"
          cp docs/deploy/velamq-bench-agent.service "dist/${agent_package}/docs/deploy/"

          tar -C dist -czf "dist/${service_package}.tar.gz" "${service_package}"
          tar -C dist -czf "dist/${agent_package}.tar.gz" "${agent_package}"

      - name: Upload release archive
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.label }}
          path: dist/*.tar.gz
          if-no-files-found: error
          retention-days: 7

  build-macos:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            label: macos-x86_64
          - runner: macos-15
            target: aarch64-apple-darwin
            label: macos-aarch64

    steps:
      - name: Validate release tag
        shell: bash
        run: |
          if [[ ! "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag must use semantic versioning, for example v0.1.0" >&2
            exit 1
          fi

      - name: Check out source
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Match tag to Cargo version
        shell: bash
        run: |
          cargo_version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "velamq-bench") | .version')"
          if [[ "v${cargo_version}" != "${RELEASE_TAG}" ]]; then
            echo "Release tag ${RELEASE_TAG} does not match Cargo.toml version v${cargo_version}" >&2
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build web console
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Install Rust target
        run: rustup target add "${{ matrix.target }}"

      - name: Build macOS binaries
        run: cargo build --locked --release --target "${{ matrix.target }}" --bins

      - name: Package service and agent archives
        shell: bash
        run: |
          service_package="velamq-bench-${RELEASE_TAG}-${{ matrix.label }}"
          agent_package="velamq-bench-agent-${RELEASE_TAG}-${{ matrix.label }}"

          mkdir -p "dist/${service_package}/web" "dist/${service_package}/docs/deploy" "dist/${agent_package}/docs/deploy"
          cp "target/${{ matrix.target }}/release/velamq-bench" "dist/${service_package}/"
          cp "target/${{ matrix.target }}/release/velamq-connbench" "dist/${service_package}/"
          cp -R web/dist "dist/${service_package}/web/dist"
          cp README.md CHANGELOG.md "dist/${service_package}/"
          cp docs/api.md docs/distributed-benchmark-plan.md docs/bench-agent-deployment.md "dist/${service_package}/docs/"
          cp docs/deploy/velamq-bench-agent.service "dist/${service_package}/docs/deploy/"

          cp "target/${{ matrix.target }}/release/velamq-bench-agent" "dist/${agent_package}/"
          cp README.md CHANGELOG.md "dist/${agent_package}/"
          cp docs/api.md docs/distributed-benchmark-plan.md docs/bench-agent-deployment.md "dist/${agent_package}/docs/"
          cp docs/deploy/velamq-bench-agent.service "dist/${agent_package}/docs/deploy/"

          tar -C dist -czf "dist/${service_package}.tar.gz" "${service_package}"
          tar -C dist -czf "dist/${agent_package}.tar.gz" "${agent_package}"

      - name: Upload release archive
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.label }}
          path: dist/*.tar.gz
          if-no-files-found: error
          retention-days: 7

  build-windows:
    name: Build windows-x86_64
    runs-on: windows-2025
    timeout-minutes: 45

    steps:
      - name: Validate release tag
        shell: pwsh
        run: |
          if ($env:RELEASE_TAG -notmatch '^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$') {
            throw 'Release tag must use semantic versioning, for example v0.1.0'
          }

      - name: Check out source
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Match tag to Cargo version
        shell: pwsh
        run: |
          $metadata = cargo metadata --no-deps --format-version 1 | ConvertFrom-Json
          $cargoVersion = ($metadata.packages | Where-Object { $_.name -eq 'velamq-bench' }).version
          if ("v$cargoVersion" -ne $env:RELEASE_TAG) {
            throw "Release tag $env:RELEASE_TAG does not match Cargo.toml version v$cargoVersion"
          }

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build web console
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Install Rust target
        run: rustup target add x86_64-pc-windows-msvc

      - name: Build Windows binaries
        run: cargo build --locked --release --target x86_64-pc-windows-msvc --bins

      - name: Package service and agent archives
        shell: pwsh
        run: |
          $servicePackage = "velamq-bench-$env:RELEASE_TAG-windows-x86_64"
          $agentPackage = "velamq-bench-agent-$env:RELEASE_TAG-windows-x86_64"

          New-Item -ItemType Directory -Force -Path "dist/$servicePackage/web", "dist/$servicePackage/docs/deploy" | Out-Null
          Copy-Item "target/x86_64-pc-windows-msvc/release/velamq-bench.exe" "dist/$servicePackage/"
          Copy-Item "target/x86_64-pc-windows-msvc/release/velamq-connbench.exe" "dist/$servicePackage/"
          Copy-Item -Recurse "web/dist" "dist/$servicePackage/web/dist"
          Copy-Item README.md, CHANGELOG.md "dist/$servicePackage/"
          Copy-Item docs/api.md, docs/distributed-benchmark-plan.md, docs/bench-agent-deployment.md "dist/$servicePackage/docs/"
          Copy-Item docs/deploy/velamq-bench-agent.service "dist/$servicePackage/docs/deploy/"

          New-Item -ItemType Directory -Force -Path "dist/$agentPackage/docs/deploy" | Out-Null
          Copy-Item "target/x86_64-pc-windows-msvc/release/velamq-bench-agent.exe" "dist/$agentPackage/"
          Copy-Item README.md, CHANGELOG.md "dist/$agentPackage/"
          Copy-Item docs/api.md, docs/distributed-benchmark-plan.md, docs/bench-agent-deployment.md "dist/$agentPackage/docs/"
          Copy-Item docs/deploy/velamq-bench-agent.service "dist/$agentPackage/docs/deploy/"

          Compress-Archive -Path "dist/$servicePackage" -DestinationPath "dist/$servicePackage.zip"
          Compress-Archive -Path "dist/$agentPackage" -DestinationPath "dist/$agentPackage.zip"

      - name: Upload release archive
        uses: actions/upload-artifact@v7
        with:
          name: release-windows-x86_64
          path: dist/*.zip
          if-no-files-found: error
          retention-days: 7

  publish-release:
    name: Publish GitHub Release
    needs:
      - build-linux-musl
      - build-macos
      - build-windows
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Download release archives
        uses: actions/download-artifact@v7
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Generate checksums
        working-directory: release-assets
        run: sha256sum *.tar.gz *.zip > SHA256SUMS

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          if ! gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release create "${RELEASE_TAG}" \
              --verify-tag \
              --title "VelaMQ Bench ${RELEASE_TAG}" \
              --generate-notes
          fi
          gh release upload "${RELEASE_TAG}" release-assets/* --clobber
